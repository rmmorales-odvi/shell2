const POPULAR_EMOJIS = ["⏱","🔢","📝","💡","🔧","🎯","🚀","⚙","🔑","🌐","📅","💰","📊","🔨","🔩","📌","🎨","🎭","🎪","🎤","🎧","⏰","⏲","⏳","⏸","⏹"];
    async function loadState() {
      if (!MASTER_KEY || MASTER_KEY === 'YOUR_JSONBIN_MASTER_KEY') {
        // No key configured yet — stay on home with empty state
        return;
      }
      if (!recordId) {
        // Create new record
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
          body: JSON.stringify({ theme: 'dark', modules: [] })
        });
        if (!res.ok) { console.warn('[Shell] failed to create JSONbin record:', res.status); return; }
        const data = await res.json();
        recordId = data.id;
        localStorage.setItem('jsonbin_record_id', recordId);
        return;
      }
      const res = await fetch(`${API}/${recordId}`, {
        headers: { 'X-Master-Key': MASTER_KEY }
      });
      if (!res.ok) return;
      const data = await res.json();
      if (data.record) {
        state.theme = data.record.theme || 'dark';
        state.modules = data.record.modules || [];
        state.recentEmojis = data.record.recentEmojis || [];
        state.shellName = data.record.shellName || 'Shell';
        state.passwordHash = data.record.passwordHash || '';
        state.activeTab = data.record.activeTab || 'general';
        state.showSaveToast = data.record.showSaveToast !== undefined ? data.record.showSaveToast : true;
        document.title = state.shellName;
      }
    }

    async function saveState() {
      if (!recordId || !MASTER_KEY || MASTER_KEY === 'YOUR_JSONBIN_MASTER_KEY') return;
      const res = await fetch(`${API}/${recordId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify({ theme: state.theme, shellName: state.shellName, passwordHash: state.passwordHash, modules: state.modules, recentEmojis: state.recentEmojis, activeTab: state.activeTab, showSaveToast: state.showSaveToast })
      });
      if (!res.ok) console.warn('[Shell] saveState failed:', res.status);
      if (res.ok) showSaveToast();
    }

    function showSaveToast() {
      if (!state.showSaveToast) return;
      const existing = document.getElementById('save-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = 'save-toast';
      toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-size:12px;padding:6px 12px;border-radius:6px;z-index:9999;pointer-events:none;';
      toast.textContent = 'Saved ✓';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function applyTheme() {
      document.documentElement.dataset.theme = state.theme;
      saveState();
    }

    let openDropdown = null;

    function renderTopBar() {
      const bar = document.getElementById('topbar') || document.createElement('div');
      bar.id = 'topbar';
      bar.innerHTML = '';
      bar.style.cssText = 'height:var(--bar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0;';

      // Shell button
      const shellBtn = document.createElement('button');
      shellBtn.textContent = state.shellName;
      shellBtn.style.cssText = 'font-size:13px;font-weight:600;color:var(--text);padding:6px 10px;border-radius:5px;';
      if (state.view === 'home') {
        shellBtn.style.background = 'var(--surface-hover)';
      }
      shellBtn.onclick = () => { state.view = 'home'; state.activeModule = null; state.currentCategory = null; render(); };
      bar.appendChild(shellBtn);

      // Separator
      const sep = document.createElement('div');
      sep.style.cssText = 'width:1px;height:20px;background:var(--border);margin:0 4px;';
      bar.appendChild(sep);

      // Module buttons - grouped by category
      const roots = state.modules.filter(m => !m.category);

      // Group categorized modules by normalized category name, preserve original casing
      const catMap = {};
      state.modules.filter(m => m.category).forEach(m => {
        const key = m.category.toLowerCase();
        if (!catMap[key]) catMap[key] = [];
        catMap[key].push(m);
      });
      const categories = Object.keys(catMap).sort((a, b) => a.localeCompare(b));

      // Render root-level modules as plain buttons
      roots.forEach(m => {
        const btn = document.createElement('button');
        btn.textContent = m.name;
        btn.style.cssText = 'font-size:12px;color:var(--text-muted);padding:5px 10px;border-radius:5px;';
        if (state.view === 'module' && state.activeModule === m.id) {
          btn.style.background = 'var(--accent-dim)';
          btn.style.color = 'var(--accent)';
        }
        btn.onclick = () => loadModule(m);
        bar.appendChild(btn);
      });

      // Render category dropdowns
      categories.forEach(catKey => {
        const modules = catMap[catKey];
        const groupDiv = document.createElement('div');
        groupDiv.className = 'dropdown-group';
        groupDiv.style.cssText = 'position:relative;';

        // Get display name from first module (preserves original casing)
        const displayName = modules[0].category;

        // Group header button
        const headerBtn = document.createElement('button');
        headerBtn.style.cssText = 'font-size:12px;color:var(--text-muted);padding:5px 10px;border-radius:5px;display:flex;align-items:center;gap:3px;';
        headerBtn.innerHTML = `${displayName} <span class="dropdown-arrow">▾</span>`;

        // Check if any module in this category is active
        const hasActive = modules.some(m => state.view === 'module' && state.activeModule === m.id);
        if (hasActive) {
          headerBtn.style.background = 'var(--accent-dim)';
          headerBtn.style.color = 'var(--accent)';
        }

        headerBtn.onclick = (e) => {
          e.stopPropagation();
          if (openDropdown === groupDiv) {
            // Close current dropdown
            groupDiv.classList.remove('open');
            openDropdown = null;
          } else {
            // Close any open dropdown first
            document.querySelectorAll('.dropdown-group.open').forEach(el => el.classList.remove('open'));
            // Open this one
            groupDiv.classList.add('open');
            openDropdown = groupDiv;
          }
        };

        groupDiv.appendChild(headerBtn);

        // Dropdown container
        const dropdown = document.createElement('div');
        dropdown.className = 'dropdown-menu';
        dropdown.style.cssText = 'position:absolute;top:100%;left:0;background:var(--surface);border:1px solid var(--border);border-radius:5px;min-width:160px;z-index:100;box-shadow:var(--dropdown-shadow);padding:4px;';

        modules.forEach(m => {
          const itemBtn = document.createElement('button');
          itemBtn.style.cssText = 'display:block;width:100%;text-align:left;font-size:12px;color:var(--text-muted);padding:6px 10px;border-radius:4px;';
          itemBtn.textContent = m.name;
          if (state.view === 'module' && state.activeModule === m.id) {
            itemBtn.style.background = 'var(--accent-dim)';
            itemBtn.style.color = 'var(--accent)';
          }
          itemBtn.onmouseenter = () => { itemBtn.style.background = 'var(--surface-hover)'; };
          itemBtn.onmouseleave = () => {
            if (!(state.view === 'module' && state.activeModule === m.id)) {
              itemBtn.style.background = '';
            }
          };
          itemBtn.onclick = (e) => {
            e.stopPropagation();
            loadModule(m);
            groupDiv.classList.remove('open');
            openDropdown = null;
          };
          dropdown.appendChild(itemBtn);
        });

        groupDiv.appendChild(dropdown);
        bar.appendChild(groupDiv);
      });

      // Flex spacer
      const spacer = document.createElement('div');
      spacer.style.cssText = 'flex:1';
      bar.appendChild(spacer);

      // Settings button
      const settingsBtn = document.createElement('button');
      settingsBtn.textContent = '\u2699';
      settingsBtn.style.cssText = 'font-size:16px;color:var(--text-muted);padding:6px 10px;border-radius:5px;';
      if (state.view === 'settings') {
        settingsBtn.style.background = 'var(--surface-hover)';
      }
      settingsBtn.onclick = () => {
        if (state.passwordHash) {
          openLockModal(() => openSettingsModal());
        } else {
          openSettingsModal();
        }
      };
      bar.appendChild(settingsBtn);

      document.body.prepend(bar);
    }

    // Close dropdowns on outside click (registered once, not per render)
    if (!window._dropdownHandler) {
      window._dropdownHandler = true;
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.dropdown-group')) {
          document.querySelectorAll('.dropdown-group.open').forEach(el => el.classList.remove('open'));
          openDropdown = null;
        }
      });
    }

    function loadModule(m) {
      state.activeModule = m.id;
      state.view = 'module';
      render();
    }

    return tile;
  };

  // Root modules first (no category)
  root.forEach(m => grid.appendChild(renderTile(m)));

  // Categorised modules as folder-style labels (clickable, no apps shown inline)
  cats.forEach(cat => {

  if (state.view === 'category' && state.currentCategory) {

            <input id="reg-cat" placeholder="Category (optional)" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;" />

          <button id="reg-submit" style="background:var(--accent);color:#fff;border-radius:5px;padding:9px 14px;font-size:13px;font-weight:500;width:100%;">Add Module</button>

          <div id="icon-preview" style="width:52px;height:52px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">📦</div>
          <div style="flex:1;">
            <div style="font-size:13px;color:var(--text);">Icon</div>
            <div style="font-size:11px;color:var(--text-dim);">Click to choose</div>
          </div>
        `;
        trigger.onclick = () => {
          openIconPicker(document.getElementById('reg-icon')?.value || '📦');
        };
        iconInput.parentNode.insertBefore(trigger, iconInput);
      }

      panel.querySelector('#reg-submit').onclick = () => {
        const nameEl = panel.querySelector('#reg-name');
        const urlEl = panel.querySelector('#reg-url');
        const nameVal = nameEl.value.trim();
        const urlVal = urlEl.value.trim();
        const icon = panel.querySelector('#reg-icon').value.trim() || '📦';
        const category = panel.querySelector('#reg-cat').value.trim();
        nameEl.style.borderColor = nameVal ? 'var(--border)' : 'var(--error, #ff5f56)';
        urlEl.style.borderColor = urlVal ? 'var(--border)' : 'var(--error, #ff5f56)';

        addModule({ name: nameVal, icon, url: urlVal, category });

        panel.querySelector('#reg-icon').value = '';
        urlEl.value = '';
        panel.querySelector('#reg-cat').value = '';
      };
      panel.querySelector('#reg-name').oninput = () => { panel.querySelector('#reg-name').style.borderColor = 'var(--border)'; };
      panel.querySelector('#reg-url').oninput = () => { panel.querySelector('#reg-url').style.borderColor = 'var(--border)'; };

      // Modules list
      const listSection = document.createElement('div');
      listSection.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;';
      listSection.innerHTML = `<div style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--text);">Registered modules (${state.modules.length})</div>`;

      if (state.modules.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.style.cssText = 'font-size:12px;color:var(--text-dim);padding:8px 0;';
        emptyMsg.textContent = 'No modules registered yet.';
        listSection.appendChild(emptyMsg);
      } else {
        state.modules.forEach(m => {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);';
          row.innerHTML = `
            <span style="font-size:18px;">${m.icon}</span>
            <div style="flex:1;overflow:hidden;">
              <div style="font-size:13px;color:var(--text);">${m.name}</div>
              <div style="font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.url}</div>
              ${m.category ? `<div style="font-size:11px;color:var(--text-dim);">📁 ${m.category}</div>` : ''}
            </div>
            <button data-delete="${m.id}" style="color:var(--text-dim);font-size:14px;padding:4px 6px;">✕</button>
          `;
          listSection.appendChild(row);
        });
        listSection.querySelectorAll('[data-delete]').forEach(btn => {
          btn.onclick = () => deleteModule(btn.dataset.delete);
        });
      }

      panel.appendChild(listSection);
      return panel;
    }
    function renderIframe(m) {
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'flex:1;display:flex;flex-direction:column;overflow:hidden;';

  const iframe = document.createElement('iframe');
  iframe.src = m.url;
  iframe.style.cssText = 'width:100%;height:calc(100vh - 44px);border:none;background:#fff;';

    function openIconPicker(currentIcon, callback) {
      const existing = document.getElementById('icon-modal-overlay');
      if (existing) existing.remove();

      const overlay = document.createElement('div');
      overlay.id = 'icon-modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:700;';

      const modal = document.createElement('div');
      modal.id = 'icon-modal';
      modal.style.cssText = 'width:340px;max-height:80vh;background:#1e1e1e;border:1px solid #333;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;';
      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeIconPicker();
      });

      const escHandler = (e) => { if (e.key === 'Escape') closeIconPicker(); };
      document.addEventListener('keydown', escHandler);
      modal._escHandler = escHandler;

      modal._currentIcon = currentIcon || '📦';
      modal._callback = callback || null;

      modal.appendChild(buildIconPickerContent(modal));

      return modal;
    }

    function buildIconPickerContent(modal) {
      const container = document.createElement('div');
      container.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;height:100%;max-height:80vh;';

      // Inject selected style (idempotent)
      if (!document.getElementById('ip-style')) {
        const s = document.createElement('style');
        s.id = 'ip-style';
        s.textContent = '.ip-cell.selected { background: #1a2340 !important; border: 1px solid #5b8af0; }';
        document.head.appendChild(s);
      }

      // Header
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #2a2a2a;flex-shrink:0;';
      header.innerHTML = `
        <span style="font-size:13px;font-weight:600;color:#fff;">Pick icon</span>
        <button id="ip-close" style="background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:0;line-height:1;">✕</button>
      `;
      header.querySelector('#ip-close').onclick = closeIconPicker;
      container.appendChild(header);

      // Category chips (scrollable row)
      const chipsWrap = document.createElement('div');
      chipsWrap.id = 'ip-chips';
      chipsWrap.style.cssText = 'display:flex;gap:6px;padding:12px 16px;overflow-x:auto;flex-shrink:0;';
      const categories = Object.keys(EMOJI_DATA).sort();

      function makeChip(label, active) {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.style.cssText = `padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:none;${active ? 'background:#5b8af0;color:#fff;' : 'background:#2a2a2a;color:#888;'}`;
        btn.onclick = () => setCategory(label);
        return btn;
      }

      const allChip = makeChip('All', true);
      chipsWrap.appendChild(allChip);
      categories.forEach(cat => chipsWrap.appendChild(makeChip(cat, false)));
      container.appendChild(chipsWrap);

      // Search bar
      const searchWrap = document.createElement('div');
      searchWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin:0 16px 10px;padding:7px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;flex-shrink:0;';
      searchWrap.innerHTML = '<span style="color:#555;font-size:14px;">🔍</span>';
      const searchInput = document.createElement('input');
      searchInput.id = 'ip-search';
      searchInput.placeholder = 'Search emojis...';
      searchInput.style.cssText = 'background:none;border:none;color:#fff;font-size:13px;flex:1;outline:none;';
      searchWrap.appendChild(searchInput);
      container.appendChild(searchWrap);

      // Scrollable body
      const body = document.createElement('div');
      body.id = 'ip-body';
      body.style.cssText = 'flex:1;overflow-y:auto;padding:0 16px 16px;';
      container.appendChild(body);

      // Footer with Confirm/Cancel
      const footer = document.createElement('div');
      footer.style.cssText = 'display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid #2a2a2a;flex-shrink:0;';
      footer.innerHTML = `
        <button id="ip-cancel" style="padding:6px 14px;border-radius:5px;font-size:12px;background:none;border:1px solid #333;color:#888;cursor:pointer;">Cancel</button>
        <button id="ip-confirm" style="padding:6px 14px;border-radius:5px;font-size:12px;background:#5b8af0;border:none;color:#fff;cursor:pointer;">Confirm</button>
      `;
      footer.querySelector('#ip-cancel').onclick = closeIconPicker;
      container.appendChild(footer);

      // State
      let selectedEmoji = modal._currentIcon || '📦';
      let activeCategory = 'All';
      let query = '';

      function renderSection(label, emojis) {
        const sectionLabel = document.createElement('div');
        sectionLabel.style.cssText = 'font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin:12px 0 6px;grid-column:1/-1;';
        sectionLabel.textContent = label;
        body.appendChild(sectionLabel);

        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(6,1fr);gap:4px;';
        emojis.forEach(em => {
          const cell = document.createElement('button');
          cell.textContent = em.emoji;
          cell.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:18px;padding:6px;border-radius:5px;border:none;background:none;cursor:pointer;';
          cell.onmouseenter = () => cell.style.background = '#2a2a2a';
          cell.onmouseleave = () => { if (!cell.classList.contains('selected')) cell.style.background = ''; };
          cell.onclick = () => {
            body.querySelectorAll('.ip-cell.selected').forEach(c => c.classList.remove('selected'));
            cell.classList.add('selected');
            selectedEmoji = em.emoji;
          };
          cell.className = `ip-cell${em.emoji === selectedEmoji ? ' selected' : ''}`;
          grid.appendChild(cell);
        });
        body.appendChild(grid);
      }

      function renderGrid(filterFn) {
        body.innerHTML = '';
        let total = 0;

        if (!query && activeCategory === 'All') {
          renderSection('Popular', POPULAR_EMOJIS.map(e => ({ id: e, name: e, emoji: e })));
        }

        if (!query && activeCategory === 'All' && state.recentEmojis.length > 0) {
          renderSection('Recent', state.recentEmojis.map(e => ({ id: e, name: e, emoji: e })));
        }

        const cats = activeCategory === 'All' ? categories : [activeCategory];
        cats.forEach(cat => {
          const emojis = EMOJI_DATA[cat] || [];
          const filtered = filterFn ? emojis.filter(filterFn) : emojis;
          if (filtered.length === 0) return;
          total += filtered.length;
          renderSection(cat, filtered);
        });

        if (total === 0) {
          body.innerHTML = `<div style="font-size:13px;color:#555;padding:20px 0;text-align:center;">No emojis match your search.</div>`;
        }
      }

      function setCategory(cat) {
        activeCategory = cat;
        chipsWrap.querySelectorAll('button').forEach(b => {
          b.style.background = b.textContent === cat ? '#5b8af0' : '#2a2a2a';
          b.style.color = b.textContent === cat ? '#fff' : '#888';
        });
        query = '';
        searchInput.value = '';
        renderGrid();
      }

      searchInput.addEventListener('input', () => {
        query = searchInput.value.toLowerCase().trim();
        activeCategory = 'All';
        chipsWrap.querySelectorAll('button').forEach(b => {
          b.style.background = b.textContent === 'All' ? '#5b8af0' : '#2a2a2a';
          b.style.color = b.textContent === 'All' ? '#fff' : '#888';
        });
        if (query) {
          renderGrid(em => em.name.toLowerCase().includes(query) || em.id.includes(query));
        } else {
          renderGrid();
        }
      });

      footer.querySelector('#ip-confirm').onclick = () => {
        const preview = document.getElementById('icon-preview');
        const hiddenInput = document.getElementById('reg-icon');
        if (preview) preview.textContent = selectedEmoji;
        if (hiddenInput) hiddenInput.value = selectedEmoji;
        if (modal._callback) modal._callback(selectedEmoji);

        if (!state.recentEmojis.includes(selectedEmoji)) {
          state.recentEmojis.unshift(selectedEmoji);
          if (state.recentEmojis.length > 10) state.recentEmojis = state.recentEmojis.slice(0, 10);
          saveState();
        }

        closeIconPicker();
      };

      // Initial render
      renderGrid();

      return container;
    }

    function renderTabContent(tab) {
      if (tab === 'general') return renderGeneralTab();
      if (tab === 'appearance') return renderAppearanceTab();
      if (tab === 'modules') return renderModulesTab();
      if (tab === 'jsonbin') return renderJSONbinTab();
      if (tab === 'advanced') return renderAdvancedTab();
      const d = document.createElement('div');
      d.style.cssText = 'font-size:13px;color:#555;';
      d.textContent = `Tab "${tab}" — to be implemented`;
      return d;
    }

    function renderGeneralTab() {
      const container = document.createElement('div');

      const nameRow = document.createElement('div');

        <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:6px;">Shell name</div>

        <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;">Password protection</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;">
            <input id="s-lock-enable" type="checkbox" ${state.passwordHash ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;" />

          </label>
        </div>
        <div id="s-lock-pw-row" style="${state.passwordHash ? '' : 'display:none'}">
          <input id="s-lock-password" type="password" placeholder="Set new password" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;" />
        </div>
      `;
      container.appendChild(lockRow);

      lockRow.querySelector('#s-lock-enable').addEventListener('change', async (e) => {
        const row = lockRow.querySelector('#s-lock-pw-row');
        if (e.target.checked) {
          row.style.display = '';
          row.querySelector('#s-lock-password').focus();
        } else {
          state.passwordHash = '';
          saveState();
          row.style.display = 'none';
        }
      });

      lockRow.querySelector('#s-lock-password').addEventListener('change', async (e) => {
        const val = e.target.value;

          state.passwordHash = await sha256(val);
          saveState();
        }

      // Save toast toggle
      const toastRow = document.createElement('div');

        <label style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);cursor:pointer;">
          <input id="s-toast-toggle" type="checkbox" ${state.showSaveToast ? 'checked' : ''} style="width:16px;height:16px;cursor:pointer;" />
          Show save toast
        </label>
      `;

        state.showSaveToast = e.target.checked;

      container.innerHTML = `

          <button id="ap-light" style="flex:1;padding:10px;border-radius:5px;font-size:13px;border:1px solid ${state.theme === 'light' ? '#5b8af0' : 'var(--border)'};background:${state.theme === 'light' ? '#1a2340' : ''};color:${state.theme === 'light' ? '#5b8af0' : 'var(--text-muted)'};cursor:pointer;">Light</button>

    function renderModulesTab() {
  const container = document.createElement('div');

  // Add button
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add Module';
  addBtn.style.cssText = 'width:100%;padding:10px;border-radius:5px;background:#5b8af0;border:none;color:#fff;font-size:13px;cursor:pointer;margin-bottom:16px;';
  addBtn.onclick = () => openModuleModal();
  container.appendChild(addBtn);

  if (state.modules.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'font-size:13px;color:var(--text-dim);text-align:center;padding:24px 0;';
    empty.textContent = 'No modules registered yet.';
    container.appendChild(empty);
    return container;
  }

  // Sort alphabetically (case-insensitive)
  const sorted = [...state.modules].sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

  // Group: uncategorized first, then by category
  const uncategorized = sorted.filter(m => !m.category);
  const catMap = {};
  sorted.filter(m => m.category).forEach(m => {
    const cat = m.category;
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(m);
  });

  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:4px;';

  // Render uncategorized modules
  uncategorized.forEach(m => list.appendChild(makeRow(m)));

  // Render category folders
  Object.keys(catMap).sort().forEach(cat => {
    const folder = makeFolder(cat, catMap[cat]);
    list.appendChild(folder);
  });

  container.appendChild(list);

  // Event delegation for edit/delete and folder toggle
  list.addEventListener('click', (e) => {
    const editBtn = e.target.closest('[data-edit]');
    if (editBtn) {
      const mod = state.modules.find(x => x.id === editBtn.dataset.edit);
      if (mod) openModuleModal(mod);
      return;
    }
    const delBtn = e.target.closest('[data-del]');
    if (delBtn) {
      state.modules = state.modules.filter(m => m.id !== delBtn.dataset.del);
      saveState();
      renderModulesTab();
      render();  // NEW: refresh launcher
      return;
    }
    const folderHeader = e.target.closest('.mod-folder-header');
    if (folderHeader) {
      const body = folderHeader.nextElementSibling;
      const collapsed = body.style.display === 'none';
      body.style.display = collapsed ? '' : 'none';
      folderHeader.querySelector('.folder-arrow').textContent = collapsed ? '▼' : '▶';
      return;
    }
  });

  return container;

  function makeRow(m) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border-radius:6px;';
    row.innerHTML = `
      <span style="font-size:18px;">${m.icon}</span>
      <div style="flex:1;overflow:hidden;">
        <div style="font-size:13px;color:var(--text);">${m.name}</div>
        <div style="font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${truncateUrl(m.url)}</div>
      </div>
      <button data-edit="${m.id}" style="background:none;border:none;color:var(--text-muted);font-size:14px;cursor:pointer;padding:4px 6px;">✎</button>
      <button data-del="${m.id}" style="background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:4px 6px;">✕</button>
    `;
    return row;
  }

  function makeFolder(cat, modules) {
    const folder = document.createElement('div');
    folder.style.cssText = 'margin-top:8px;';
    const header = document.createElement('div');
    header.className = 'mod-folder-header';
    header.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;border-radius:6px;';
    header.innerHTML = `
      <span class="folder-arrow" style="font-size:11px;color:var(--text-dim);">▼</span>
      <span style="font-size:13px;color:var(--text-muted);">📁 ${cat}</span>
      <span style="font-size:11px;color:var(--text-dim);margin-left:4px;">(${modules.length})</span>
    `;
    const body = document.createElement('div');
    body.style.cssText = 'display:flex;flex-direction:column;gap:4px;padding-left:12px;padding-top:4px;';
    modules.forEach(m => body.appendChild(makeRow(m)));
    folder.appendChild(header);
    folder.appendChild(body);
    return folder;
  }
}

function truncateUrl(url) {
  return url.length > 45 ? url.slice(0, 42) + '...' : url;
}
    function renderJSONbinTab() {
  const container = document.createElement('div');

  // API Key
  const keySection = document.createElement('div');
  keySection.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;';
  keySection.innerHTML = `
    <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:6px;">API Key</div>
    <input id="jb-key" type="password" value="${MASTER_KEY !== 'YOUR_JSONBIN_MASTER_KEY' ? MASTER_KEY : ''}" placeholder="paste your JSONbin master key" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;" />
  `;
  container.appendChild(keySection);

  // Bin ID
  const idSection = document.createElement('div');
  idSection.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;';
  const createNewBin = !recordId;
  idSection.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:12px;font-weight:500;color:var(--text);">Bin ID</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);cursor:pointer;">
        <input id="jb-new-bin" type="checkbox" ${createNewBin ? 'checked' : ''} style="cursor:pointer;" />
        Create new bin
      </label>
    </div>
    <input id="jb-bin-id" value="${recordId || ''}" placeholder="Paste bin ID to use existing bin" ${createNewBin ? 'disabled' : ''} style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;font-family:monospace;opacity:${createNewBin ? '0.5' : '1'};${createNewBin ? 'pointer-events:none;' : ''}" />
  `;
  container.appendChild(idSection);

  // Toggle bin ID input based on "create new bin" checkbox
  idSection.querySelector('#jb-new-bin').addEventListener('change', (e) => {
    const input = idSection.querySelector('#jb-bin-id');
    const checked = e.target.checked;
    input.disabled = checked;
    input.style.opacity = checked ? '0.5' : '1';
    input.style.color = checked ? 'var(--text-dim)' : 'var(--text)';
    if (checked) input.style.pointerEvents = 'none';
    else input.style.pointerEvents = '';
    if (checked) input.value = '';
  });

  // Sync status
  const syncStatus = document.createElement('div');
  syncStatus.style.cssText = 'font-size:12px;color:var(--text-dim);text-align:center;padding:8px 0;';
  if (!MASTER_KEY || MASTER_KEY === 'YOUR_JSONBIN_MASTER_KEY') {
    syncStatus.textContent = 'Set API key above to enable sync';
  } else if (recordId) {
    syncStatus.textContent = 'Changes are saved automatically';
  } else {
    syncStatus.textContent = 'Save settings to create a new bin';
  }
  container.appendChild(syncStatus);

  // Force save button (for when create-new-bin is checked)
  const forceBtn = document.createElement('button');
  forceBtn.textContent = '↻ Sync Now';
  forceBtn.style.cssText = 'padding:10px 16px;background:#5b8af0;border:none;border-radius:5px;color:#fff;font-size:13px;cursor:pointer;margin-bottom:12px;';
  forceBtn.onclick = async () => {
    const newKey = document.getElementById('jb-key').value.trim();
    if (newKey && newKey !== MASTER_KEY) {
      MASTER_KEY = newKey;
      localStorage.setItem('shell_master_key', newKey);
    }
    if (!MASTER_KEY || MASTER_KEY === 'YOUR_JSONBIN_MASTER_KEY') return;
    const createNew = document.getElementById('jb-new-bin').checked;
    const binIdInput = document.getElementById('jb-bin-id').value.trim();
    if (createNew) {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
        body: JSON.stringify({ theme: state.theme, shellName: state.shellName, passwordHash: state.passwordHash, modules: state.modules, recentEmojis: state.recentEmojis, activeTab: state.activeTab, showSaveToast: state.showSaveToast })
      });
      if (!res.ok) return;
      const data = await res.json();
      recordId = data.id;
      localStorage.setItem('jsonbin_record_id', recordId);
      document.getElementById('jb-bin-id').value = recordId;
      document.getElementById('jb-new-bin').checked = false;
      document.getElementById('jb-bin-id').disabled = false;
      document.getElementById('jb-bin-id').style.opacity = '1';
      document.getElementById('jb-bin-id').style.color = 'var(--text)';
      document.getElementById('jb-bin-id').style.pointerEvents = '';
      syncStatus.textContent = 'Changes are saved automatically';
    } else {
      if (binIdInput && binIdInput !== recordId) {
        recordId = binIdInput;
        localStorage.setItem('jsonbin_record_id', recordId);
      }
      await saveState();
    }
  };
  container.appendChild(forceBtn);

  // API key save on change
  keySection.querySelector('#jb-key').addEventListener('change', (e) => {
    const val = e.target.value.trim();
    if (val && val !== MASTER_KEY) {
      MASTER_KEY = val;
      localStorage.setItem('shell_master_key', val);
    }
  });

  return container;
}
function renderAdvancedTab() {
  const container = document.createElement('div');
  container.style.cssText = 'display:flex;flex-direction:column;gap:12px;';

  // Export
  const expBtn = document.createElement('button');
  expBtn.textContent = '↓ Export modules as JSON';
  expBtn.style.cssText = 'padding:10px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;';
  expBtn.onclick = () => {
    const blob = new Blob([JSON.stringify({ modules: state.modules, shellName: state.shellName }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'modules.json'; a.click();
  };
  container.appendChild(expBtn);

  // Import
  const impWrap = document.createElement('div');
  impWrap.innerHTML = `
    <input type="file" id="imp-file" accept=".json" style="display:none;" />
    <button id="imp-btn" style="padding:10px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;width:100%;">↑ Import modules from JSON</button>
  `;
  impWrap.querySelector('#imp-btn').onclick = () => impWrap.querySelector('#imp-file').click();
  impWrap.querySelector('#imp-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.modules && Array.isArray(data.modules)) {
          state.modules = data.modules;
          if (data.shellName) state.shellName = data.shellName;
          saveState();
          render();  // NEW: refresh launcher
          alert('Import successful! Reload to see all changes.');
        } else if (Array.isArray(data)) {
          state.modules = data;
          saveState();
          render();  // NEW: refresh launcher
          alert('Import successful! Reload to see all changes.');
        } else {
          alert('Invalid JSON format.');
        }
      } catch { alert('Invalid JSON file.'); }
    };
    reader.readAsText(file);
  });
  container.appendChild(impWrap);

  // Factory reset
  const resetBtn = document.createElement('button');
  resetBtn.textContent = '⚠ Factory reset — clear all data';
  resetBtn.style.cssText = 'padding:10px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:#ff5f56;font-size:13px;cursor:pointer;';
  resetBtn.onclick = () => {
    if (!confirm('This will clear all modules, shell name, theme, and password. Your JSONbin data will remain but local state will be reset. Continue?')) return;
    localStorage.removeItem('jsonbin_record_id');
    localStorage.removeItem('shell_master_key');
    location.reload();
  };
  container.appendChild(resetBtn);

  return container;
}

    function openSettingsModal(initialTab) {
      const tab = initialTab || state.activeTab || 'general';
      const overlay = document.createElement('div');
      overlay.id = 'settings-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;';
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSettingsModal(); });

      window._settingsEscHandler = (e) => { if (e.key === 'Escape') closeSettingsModal(); };
      document.addEventListener('keydown', window._settingsEscHandler);

      const modal = document.createElement('div');
      modal.style.cssText = 'width:520px;max-height:80vh;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;';
      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      // Tab bar
      const tabBar = document.createElement('div');
      tabBar.style.cssText = 'display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;';
      modal.appendChild(tabBar);

      // Tab content container
      const tabContent = document.createElement('div');
      tabContent.style.cssText = 'flex:1;overflow-y:auto;padding:16px;';
      modal.appendChild(tabContent);

      function selectTab(name) {
        state.activeTab = name;
        saveState();
        tabBar.querySelectorAll('.st-tab').forEach(t => {
          t.style.background = t.dataset.tab === name ? 'var(--surface-hover)' : '';
          t.style.color = t.dataset.tab === name ? 'var(--text)' : 'var(--text-muted)';
        });
        tabContent.innerHTML = '';
        tabContent.appendChild(renderTabContent(name));
      }

      const tabs = ['general','appearance','modules','jsonbin','advanced'];
      tabs.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'st-tab';
        btn.dataset.tab = t;
        btn.textContent = tabLabel(t);
        btn.style.cssText = `padding:10px 14px;font-size:12px;border:none;cursor:pointer;white-space:nowrap;background:${t === tab ? 'var(--surface-hover)' : ''};color:${t === tab ? 'var(--text)' : 'var(--text-muted)'};`;
        btn.style.borderBottom = t === tab ? '2px solid #5b8af0' : '2px solid transparent';
        btn.onclick = () => selectTab(t);
        tabBar.appendChild(btn);
      });

      tabContent.appendChild(renderTabContent(tab));

      return modal;
    }

    function openLockModal(onSuccess) {
      const overlay = document.createElement('div');
      overlay.id = 'lock-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;';
      document.body.appendChild(overlay);

      const box = document.createElement('div');
      box.style.cssText = 'width:300px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 24px;text-align:center;';
      overlay.appendChild(box);

      box.innerHTML = `
        <div style="font-size:36px;margin-bottom:12px;">🔒</div>
        <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:20px;">Settings are locked</div>
        <input id="lock-pw" type="password" placeholder="Enter password" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:9px 12px;color:var(--text);font-size:13px;text-align:center;outline:none;margin-bottom:12px;box-sizing:border-box;" />
        <div id="lock-error" style="font-size:12px;color:#ff5f56;margin-bottom:8px;display:none;">Incorrect password</div>
        <div style="display:flex;gap:8px;">
          <button id="lock-cancel" style="flex:1;padding:8px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);font-size:13px;cursor:pointer;">Cancel</button>
          <button id="lock-unlock" style="flex:1;padding:8px;background:#5b8af0;border:none;border-radius:5px;color:#fff;font-size:13px;cursor:pointer;">Unlock</button>
        </div>
      `;

      // Shake animation
      box.querySelector('#lock-cancel').onclick = () => overlay.remove();
      box.querySelector('#lock-unlock').onclick = async () => {
        const val = box.querySelector('#lock-pw').value;
        if (!val) return;
        const hash = await sha256(val);
        if (hash === state.passwordHash) {
          overlay.remove();
          onSuccess();
        } else {
          box.querySelector('#lock-error').style.display = 'block';
          // Shake animation
          const inp = box.querySelector('#lock-pw');
          inp.style.borderColor = '#ff5f56';
          inp.classList.add('shake');
          setTimeout(() => inp.classList.remove('shake'), 400);
        }
      };
      box.querySelector('#lock-pw').addEventListener('keydown', e => { if (e.key === 'Enter') box.querySelector('#lock-unlock').click(); });
      box.querySelector('#lock-pw').addEventListener('input', () => { box.querySelector('#lock-error').style.display = 'none'; });
    }

    // Shake animation CSS
    if (!document.getElementById('shake-style')) {
      const s = document.createElement('style');
      s.id = 'shake-style';
      s.textContent = '@keyframes shakeAnim{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.shake{animation:shakeAnim .4s ease-in-out}';
      document.head.appendChild(s);
    }

    function closeSettingsModal() {
      document.removeEventListener('keydown', window._settingsEscHandler);
      document.getElementById('settings-overlay')?.remove();
    }

    function openModuleModal(module) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:600;';
      document.body.appendChild(overlay);

      const box = document.createElement('div');
      box.style.cssText = 'width:460px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;';
      overlay.appendChild(box);

      const title = module ? 'Edit Module' : 'Add Module';
      box.innerHTML = `
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;">${title}</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input id="mm-name" placeholder="Module name" value="${module?.name || ''}" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;" />
          <div style="display:flex;gap:8px;align-items:center;">
            <div id="mm-icon-preview" style="width:44px;height:44px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;cursor:pointer;">${module?.icon || '📦'}</div>
            <input id="mm-icon" type="hidden" value="${module?.icon || '📦'}" />
            <input id="mm-cat" placeholder="Category (optional)" value="${module?.category || ''}" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;" />
          </div>
          <input id="mm-url" placeholder="HTML URL" value="${module?.url || ''}" style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;" />
          <div style="display:flex;gap:8px;margin-top:4px;">
            <button id="mm-cancel" style="flex:1;padding:9px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-muted);font-size:13px;cursor:pointer;">Cancel</button>
            <button id="mm-save" style="flex:1;padding:9px;background:#5b8af0;border:none;border-radius:5px;color:#fff;font-size:13px;cursor:pointer;">${module ? 'Save Changes' : 'Add Module'}</button>
          </div>
        </div>
      `;

      box.querySelector('#mm-icon-preview').onclick = () => {
        const preview = box.querySelector('#mm-icon-preview');
        const hidden = box.querySelector('#mm-icon');
        openIconPicker(hidden.value, (emoji) => {
          hidden.value = emoji;
          preview.textContent = emoji;
        });
      };

      box.querySelector('#mm-cancel').onclick = () => overlay.remove();
      box.querySelector('#mm-save').onclick = () => {
        const name = box.querySelector('#mm-name').value.trim();
        const icon = box.querySelector('#mm-icon').value || '📦';
        const url = box.querySelector('#mm-url').value.trim();
        const category = box.querySelector('#mm-cat').value.trim();
        if (!name || !url) return;
        if (module) {
          module.name = name; module.icon = icon; module.url = url; module.category = category;
        } else {
          state.modules.push({ id: crypto.randomUUID(), name, icon, url, category });
        }
        saveState();
        overlay.remove();
        renderModulesTab();
      };
    }

    function tabLabel(name) {
      return { general:'General', appearance:'Appearance', modules:'Modules', jsonbin:'JSONbin', advanced:'Advanced' }[name] || name;
    }

    function closeIconPicker() {
      const overlay = document.getElementById('icon-modal-overlay');
      if (overlay) overlay.remove();
    }

    function render() {
      applyTheme();
      renderTopBar();
      const app = document.getElementById('app');
      app.innerHTML = '';
      if (state.view === 'home') {
        app.appendChild(renderLauncher());
      } else if (state.view === 'settings') {
        app.appendChild(renderSettings());
      } else if (state.view === 'module') {
        const m = state.modules.find(x => x.id === state.activeModule);
        app.appendChild(renderIframe(m));
      }
    }

    loadState().then(render);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.activeModule) {
          state.view = 'home';
          state.activeModule = null;
          render();
        } else if (state.view === 'category') {
          state.view = 'home';
          state.currentCategory = null;
          render();
        }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        state.view = 'home';
        state.activeModule = null;
        render();
        setTimeout(() => {
          const inp = document.querySelector('[data-filter]');
          if (inp) inp.focus();
        }, 50);
      }
    });
  </script>
</body>
</html>
